name: JARVIS OMEGA CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Protocol Schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate JSON schemas
        run: |
          echo "Validating protocol schemas..."
          for file in protocols/*.json; do
            if [ -f "$file" ]; then
              python3 -c "import json; json.load(open('$file'))" && echo "VALID: $file"
            fi
          done
          echo "Schema validation complete!"

  quality-check:
    name: Code Quality & Standards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check directory structure
        run: |
          echo "Checking JARVIS OMEGA directory structure..."
          ls -la
          echo "Checking protocols directory..."
          ls -la protocols/ || true
          echo "Checking issues directory..."
          ls -la issues/ || true
          echo "Directory structure validated!"

  status-check:
    name: Project Status Report
    runs-on: ubuntu-latest
    needs: [validate, quality-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate status report
        run: |
          echo "=== JARVIS OMEGA CI/CD Pipeline ==="
          echo "Pipeline executed at: $(date -u)"
          echo "Branch: $GITHUB_REF"
          echo "Commit: $GITHUB_SHA"
          echo "Event: $GITHUB_EVENT_NAME"
          echo ""
          echo "All checks passed successfully!"
          echo "JARVIS OMEGA Protocol is operational."
