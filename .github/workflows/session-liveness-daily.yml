name: Session Liveness Guard

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch: {}

jobs:
  liveness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalando dependências
        run: python -m pip install --upgrade pip
      - name: Executar script de avaliação de liveness (report_only)
        run: |
          python scripts/session_liveness_guard.py --sessions-dir sessions --policy configs/session-liveness-policy.json --report-path reports/liveness-report-$(date -u +"%Y%m%dT%H%M%SZ").json
      - name: Publicar relatório como artifact
        uses: actions/upload-artifact@v4
        with:
          name: session-liveness-report-${{ github.run_id }}
          path: reports/liveness-report-*.json
          if-no-files-found: error
